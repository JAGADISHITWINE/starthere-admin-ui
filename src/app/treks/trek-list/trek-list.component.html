<ion-content class="treks-page">
  <div class="app-shell">
    <div class="page-header treks-header">
      <div class="crumb">
        <button class="icon-btn" routerLink="/admin/dashboard" aria-label="Back">
          <i class="bi bi-arrow-left text-dark"></i>
        </button>
        <span>Treks</span>
      </div>
      <h1 class="page-title">All Treks</h1>
      <p class="page-subtitle">Browse active batches, edit trek details, and preview batches.</p>
    </div>

    <div class="trek-summary">
      <div class="summary-card">
        <h3>{{ treks.length }}</h3>
        <p>Total Treks</p>
      </div>
      <div class="summary-card">
        <h3>{{ activeCount }}</h3>
        <p>Active Batches</p>
      </div>
    </div>

    <div class="trek-search">
      <ion-searchbar [(ngModel)]="searchQuery" placeholder="Search treks..." animated="true"></ion-searchbar>
    </div>

    <div class="trek-grid">
      <div class="trek-card" *ngFor="let trek of filteredTreks">
        <div class="trek-cover">
          <img [src]="'http://localhost:4001/' + trek.cover_image" />
          <span class="status-pill" [ngClass]="{
            'status-success': trek.status === 'active',
            'status-secondary': trek.status === 'draft'
          }">
            {{ trek.status | uppercase }}
          </span>
        </div>

        <div class="trek-body">
          <div class="trek-top">
            <h4>{{ trek.name }}</h4>
            <button class="icon-btn" (click)="editTrek(trek.id)" aria-label="Edit trek">
              <i class="bi bi-pencil"></i>
            </button>
          </div>
          <p class="trek-location"><i class="bi bi-geo-alt"></i> {{ trek.location }}</p>
          <div class="batch-pills" *ngIf="trek?.batches?.length">
            <button class="pill" *ngFor="let batch of trek.batches" (click)="viewTrek(batch.id)">
              ⏱ {{ batch.duration }} · ₹{{ batch.price }} / {{ batch.startDate | date: 'dd MMM yyyy' }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="filteredTreks.length === 0" class="state-center">
      <div class="empty-card">
        <h5>No treks found</h5>
        <p>Try a different search.</p>
      </div>
    </div>
  </div>
</ion-content>
