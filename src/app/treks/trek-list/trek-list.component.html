<ion-content class="treks-page">
  <app-admin-shell
    sectionLabel="Treks"
    title="All Treks"
    subtitle="Browse active batches, edit trek details, and preview batches.">


    <div class="trek-summary">
      <div class="summary-card">
        <h3>{{ treks.length }}</h3>
        <p>Total Treks</p>
      </div>
      <div class="summary-card">
        <h3>{{ activeCount }}</h3>
        <p>Active Batches</p>
      </div>
    </div>

    <div class="trek-toolbar">
      <div class="trek-search">
        <ion-searchbar [(ngModel)]="searchQuery" placeholder="Search treks..." animated="true"></ion-searchbar>
      </div>
      <button class="btn-app" routerLink="/admin/treks/add" type="button">
        <i class="bi bi-plus-circle me-2"></i>
        Add Trek
      </button>
    </div>

    <div class="trek-grid">
      <div class="trek-card" *ngFor="let trek of visibleTreks">
        <div class="trek-cover">
          <img loading="lazy" decoding="async" [src]="mediaBaseUrl + trek.cover_image" />
          <span class="status-pill" [ngClass]="{
            'status-success': trek.status === 'active',
            'status-secondary': trek.status === 'draft'
          }">
            {{ trek.status | uppercase }}
          </span>
        </div>

        <div class="trek-body">
          <div class="trek-top">
            <h4>{{ trek.name }}</h4>
            <button class="icon-btn" (click)="editTrek(trek.id)" aria-label="Edit trek">
              <i class="bi bi-pencil text-dark"></i>
            </button>
          </div>
          <p class="trek-location"><i class="bi bi-geo-alt"></i> {{ trek.location }}</p>
          <p class="small text-muted mb-2">
            Active: {{ getBatchStatusCount(trek, 'active') }} |
            Inactive: {{ getBatchStatusCount(trek, 'inactive') }}
          </p>
          <div class="batch-pills" *ngIf="getVisibleBatches(trek).length">
            <button class="pill" *ngFor="let batch of getVisibleBatches(trek)" (click)="viewTrek(batch.id)">
              {{ getBatchStatusLabel(batch) | uppercase }} · ⏱ {{ batch.duration }} · ₹{{ batch.price }} / {{ batch.startDate | date: 'dd MMM yyyy' }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="visibleTreks.length === 0" class="state-center">
      <div class="empty-card">
        <h5>No treks found</h5>
        <p>Try a different search.</p>
      </div>
    </div>
  
  </app-admin-shell>
</ion-content>
