<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Manage Reviews</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Filters -->
  <div class="filters-section">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="6">
          <div class="results-count">
            <strong>{{ filteredReviews.length }}</strong> reviews found
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!-- Reviews List -->
  <div class="reviews-list">
    <ion-card *ngFor="let review of filteredReviews" class="review-card">
      <ion-card-content>
        <div class="review-header">
          <div class="customer-info">
            <img
              [src]="review.avatar"
              [alt]="review.customerName"
              class="avatar"
            />
            <div>
              <h3>{{ review.customerName }}</h3>
              <p class="trek-name">{{ review.trekName }}</p>
            </div>
          </div>
        </div>
        <div class="likes-display">
          <ion-icon name="heart" color="danger"></ion-icon>
          <span>{{ review.likes }}</span>
        </div>

        <p class="comment">{{ review.comment }}</p>

        <div class="review-footer">
          <span class="date">
            <ion-icon name="calendar-outline"></ion-icon>
            {{ review.date }}
          </span>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
