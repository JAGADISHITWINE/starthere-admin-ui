<ion-content class="reviews-page">
  <app-admin-shell
    sectionLabel="Reviews"
    title="Manage Reviews"
    subtitle="Track guest feedback and trip sentiment in one place.">

    <div class="review-summary">
      <span><strong>{{ filteredReviews.length }}</strong> reviews found</span>
      <div class="review-filters">
        <label for="reviewStatus">Status</label>
        <select id="reviewStatus" [(ngModel)]="selectedStatus">
          <option value="all">All</option>
          <option *ngFor="let status of reviewStatusOptions" [value]="status">{{ status | titlecase }}</option>
        </select>
      </div>
    </div>

    <div class="reviews-grid">
      <div class="review-card" *ngFor="let review of filteredReviews">
        <div class="review-top">
          <div class="customer-info">
            <img loading="lazy" decoding="async" [src]="review.avatar" [alt]="review.customerName" class="avatar" />
            <div>
              <h3>{{ review.customerName }}</h3>
              <p class="trek-name">{{ review.trekName }}</p>
            </div>
          </div>
          <div class="likes-display">
            <i class="bi bi-heart-fill"></i>
            <span>{{ review.likes }}</span>
          </div>
        </div>

        <p class="comment">{{ review.comment }}</p>

        <div class="review-footer">
          <span class="date">
            <i class="bi bi-calendar-event"></i>
            {{ review.date }}
          </span>
          <span class="status-pill" [ngClass]="'status-' + review.status">
            {{ review.status | titlecase }}
          </span>
        </div>

        <div class="review-footer" *ngIf="review.status === 'pending'">
          <button class="btn-app" (click)="updateReviewStatus(review, 'approved')">
            <i class="bi bi-check2-circle"></i>
            Approve
          </button>
          <button class="btn-app bg-danger" (click)="updateReviewStatus(review, 'rejected')">
            <i class="bi bi-x-circle"></i>
            Reject
          </button>
        </div>
      </div>
    </div>
  </app-admin-shell>
</ion-content>
